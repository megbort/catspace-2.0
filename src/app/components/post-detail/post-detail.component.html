<div class="bg-card p-4 flex flex-col gap-2 h-full">
  <div class="flex justify-end">
    <button
      class="small"
      mat-icon-button
      (click)="close()"
      [attr.aria-label]="'buttons.close' | translate"
    >
      <mat-icon class="icon-16">close</mat-icon>
    </button>
  </div>

  <h3>{{ displayPost().title }}</h3>

  <div class="p-2 grow flex flex-col gap-2">
    <div class="mb-4 aspect-[4/3] w-full overflow-hidden rounded">
      @defer (on viewport) {
        <img
          unpic
          priority
          [src]="displayPost().image"
          [alt]="displayPost().title"
          class="h-full w-full object-cover"
        />
      } @placeholder {
        <div class="h-full w-full bg-catspace-grey"></div>
      }
    </div>

    <div class="flex items-center justify-between gap-2">
      <p class="subtitle-2">
        {{ favoriteCount() }} {{ "common.favorites" | translate }}
      </p>
      <button
        type="button"
        class="heart-button bg-transparent border-none p-0 text-catspace-orange hover:text-catspace-dark-orange hover:cursor-pointer"
        [disabled]="loading()"
        (click)="toggleFavorite()"
        [attr.aria-label]="
          isFavorited() ? 'Remove from favorites' : 'Add to favorites'
        "
      >
        @if (isFavorited()) {
          <span class="material-icons icon-24">favorite</span>
        } @else {
          <span class="material-icons icon-24">favorite_border</span>
        }
      </button>
    </div>
    <div>
      <p class="text-body-1">{{ displayPost().description }}</p>
    </div>
  </div>
</div>
