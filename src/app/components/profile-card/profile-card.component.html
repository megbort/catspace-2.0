<div
  class="flex flex-col justify-between shadow-card rounded p-3 h-[355px] w-[275px] bg-card"
>
  <div class="w-full h-[450px] overflow-hidden rounded">
    @defer (on viewport) {
      <img
        unpic
        [src]="
          profile().image ||
          'https://res.cloudinary.com/dm1yyjg7i/image/upload/v1753057717/catspace/no-avatar_mm3idt.png'
        "
        alt="{{ profile().name }}"
        class="object-cover w-full h-full rounded block"
      />
    } @placeholder {
      <div class="bg-catspace-grey w-full h-full rounded"></div>
    }
  </div>
  <div class="h-full flex flex-col justify-around">
    <div>
      <p class="subtitle-1 line-clamp-1">{{ profile().name }}</p>
      <p class="text-body-1">&#64;{{ profile().handle }}</p>
      <p class="text-body-1">
        {{ followerCount() }} {{ "common.followers" | translate }}
      </p>
    </div>
    <p class="text-body-2 text-catspace-orange py-2 line-clamp-2">
      {{ formattedTags }}
    </p>
    <div class="flex justify-between gap-2">
      <mat-button-toggle
        class="basis-1/2 card-button"
        [checked]="following()"
        (change)="toggleFollow($event)"
      >
        {{ (following() ? "button.unfollow" : "button.follow") | translate }}
      </mat-button-toggle>
      <button
        mat-stroked-button
        class="basis-1/2 card-button"
        (click)="view.emit(profile().id)"
      >
        {{ "button.viewProfile" | translate }}
      </button>
    </div>
  </div>
</div>
