<app-custom-dialog [title]="'createPost.title' | translate">
  <form [formGroup]="form">
    @if (form.get("image")?.value) {
      <div
        #imageContainer
        class="relative overflow-hidden rounded w-full cursor-grab active:cursor-grabbing select-none bg-catspace-grey"
        style="aspect-ratio: 4/3; touch-action: none"
        (mousedown)="startDrag($event)"
        (touchstart)="startDrag($event)"
        (touchmove)="onTouchMove($event)"
        (touchend)="onTouchEnd()"
      >
        <img
          #imageElement
          [src]="form.get('image')?.value"
          class="absolute left-1/2 top-1/2 pointer-events-none user-select-none max-w-none"
          [style.width.px]="baseW()"
          [style.height.px]="baseH()"
          [style.transform]="imageTransform()"
          draggable="false"
          alt=""
          (load)="onImageLoad()"
        />
      </div>

      <div class="flex items-center justify-between mt-2">
        <button mat-button type="button" (click)="removeImage()">
          <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-catspace-orange icon-16"
              >delete</span
            >
            <span class="text-body-2 text-catspace-brown">{{
              "button.remove" | translate
            }}</span>
          </div>
        </button>

        <div class="flex items-center gap-1">
          <button
            mat-icon-button
            type="button"
            [disabled]="!canZoomOut()"
            (click)="zoomOut()"
            aria-label="Zoom out"
          >
            <span class="material-symbols-outlined icon-20">remove</span>
          </button>
          <button
            mat-icon-button
            type="button"
            [disabled]="!canZoomIn()"
            (click)="zoomIn()"
            aria-label="Zoom in"
          >
            <span class="material-symbols-outlined icon-20">add</span>
          </button>
        </div>

        <button mat-button type="button" (click)="filePicker.click()">
          <div class="flex items-center gap-1">
            <span class="material-symbols-outlined icon-16 text-catspace-orange"
              >upload</span
            >
            <span class="text-body-2 text-catspace-brown">{{
              "button.uploadNew" | translate
            }}</span>
          </div>
        </button>
      </div>
    } @else {
      <button
        type="button"
        class="rounded bg-catspace-grey h-[300px] flex flex-col items-center justify-center cursor-pointer w-full border-none text-catspace-black hover:text-catspace-brown transition-colors"
        (click)="filePicker.click()"
        [attr.aria-label]="'createPost.form.image' | translate"
      >
        <span class="material-symbols-outlined icon-60"> add_box </span>
        <p>{{ "createPost.form.image" | translate }}</p>
      </button>
    }
    <input
      #filePicker
      type="file"
      class="hidden"
      accept=".jpg,.jpeg,.png"
      (change)="onFileSelected($event)"
    />

    <div class="flex flex-col gap-1 mt-4">
      <mat-form-field appearance="outline">
        <mat-label>
          {{ "createPost.form.title" | translate }}
        </mat-label>
        <input
          matInput
          formControlName="title"
          type="text"
          [placeholder]="'createPost.form.titlePlaceholder' | translate"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>
          {{ "createPost.form.description" | translate }}
        </mat-label>
        <textarea
          matInput
          formControlName="description"
          type="text"
          [placeholder]="'createPost.form.descriptionPlaceholder' | translate"
        ></textarea>
      </mat-form-field>
    </div>

    <div class="flex gap-2 mt-4">
      <button mat-stroked-button type="button" class="flex-1" (click)="close()">
        {{ "button.cancel" | translate }}
      </button>
      <button
        mat-flat-button
        type="button"
        class="flex-1"
        (click)="post()"
        [disabled]="isPosting()"
      >
        @if (isPosting()) {
          <mat-spinner diameter="18" />
        } @else {
          {{ "button.post" | translate }}
        }
      </button>
    </div>
  </form>
</app-custom-dialog>
